substitutions:
  _REGION: southamerica-east1
  _SERVER_IMAGE: southamerica-east1-docker.pkg.dev/$PROJECT_ID/safety-board/server
  _CLIENT_IMAGE: southamerica-east1-docker.pkg.dev/$PROJECT_ID/safety-board/client
  _VITE_SERVER_URL: ''
  _CLIENT_URL: ''

steps:
  # ── Server image ─────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          -f apps/server/Dockerfile \
          -t $_SERVER_IMAGE:$COMMIT_SHA \
          -t $_SERVER_IMAGE:latest \
          .

  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker push $_SERVER_IMAGE --all-tags

  # ── Client image ─────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          -f apps/client/Dockerfile \
          --build-arg VITE_SERVER_URL=$_VITE_SERVER_URL \
          -t $_CLIENT_IMAGE:$COMMIT_SHA \
          -t $_CLIENT_IMAGE:latest \
          .

  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker push $_CLIENT_IMAGE --all-tags

  # ── Deploy server ─────────────────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy safety-board-server \
          --image=$_SERVER_IMAGE:$COMMIT_SHA \
          --region=$_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --port=3001 \
          --min-instances=1 \
          --max-instances=5 \
          --memory=512Mi \
          --cpu=1 \
          --set-env-vars=NODE_ENV=production \
          --set-env-vars=CLIENT_URL=$_CLIENT_URL \
          --update-secrets=JWT_SECRET=safety-board-jwt-secret:latest \
          --update-secrets=MONGODB_URI=safety-board-mongodb-uri:latest \
          --quiet

  # ── Deploy client ─────────────────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy safety-board-client \
          --image=$_CLIENT_IMAGE:$COMMIT_SHA \
          --region=$_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --min-instances=0 \
          --max-instances=3 \
          --memory=256Mi \
          --cpu=1 \
          --quiet

images:
  - $_SERVER_IMAGE:$COMMIT_SHA
  - $_SERVER_IMAGE:latest
  - $_CLIENT_IMAGE:$COMMIT_SHA
  - $_CLIENT_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
