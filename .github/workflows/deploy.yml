name: CD

on:
  push:
    branches: [main]

env:
  GCP_REGION: southamerica-east1
  ARTIFACT_REGISTRY: southamerica-east1-docker.pkg.dev
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  SERVER_IMAGE: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/safety-board/server
  CLIENT_IMAGE: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/safety-board/client

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      # ── Server image ────────────────────────────────────────────────────────
      - name: Build server image
        run: |
          docker build \
            --file apps/server/Dockerfile \
            --tag ${{ env.SERVER_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.SERVER_IMAGE }}:latest \
            .

      - name: Push server image
        run: docker push ${{ env.SERVER_IMAGE }} --all-tags

      # ── Client image ────────────────────────────────────────────────────────
      - name: Build client image
        run: |
          docker build \
            --file apps/client/Dockerfile \
            --build-arg VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }} \
            --tag ${{ env.CLIENT_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.CLIENT_IMAGE }}:latest \
            .

      - name: Push client image
        run: docker push ${{ env.CLIENT_IMAGE }} --all-tags

      # ── Cloud Run deploys ────────────────────────────────────────────────────
      - name: Deploy server to Cloud Run
        run: |
          gcloud run deploy safety-board-server \
            --image ${{ env.SERVER_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3001 \
            --min-instances 1 \
            --max-instances 5 \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars NODE_ENV=production \
            --set-env-vars CLIENT_URL=${{ secrets.CLIENT_URL }} \
            --update-secrets JWT_SECRET=safety-board-jwt-secret:latest \
            --update-secrets MONGODB_URI=safety-board-mongodb-uri:latest \
            --quiet

      - name: Deploy client to Cloud Run
        run: |
          gcloud run deploy safety-board-client \
            --image ${{ env.CLIENT_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 256Mi \
            --cpu 1 \
            --quiet
