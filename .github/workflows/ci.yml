name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Unit tests with coverage
        run: pnpm coverage

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Create server .env for E2E
        run: printf 'PORT=3001\nCLIENT_URL=http://localhost:5173\nJWT_SECRET=e2e-ci-secret-placeholder\nBCRYPT_ROUNDS=4\nMONGODB_URI=mongodb://localhost:27017/safety-board-e2e\n' > apps/server/.env

      - name: E2E smoke test
        run: pnpm test:e2e
