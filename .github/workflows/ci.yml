name: CI / CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Unit tests with coverage
        run: pnpm coverage

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Create server .env for E2E
        run: printf 'PORT=3001\nCLIENT_URL=http://localhost:5173\nJWT_SECRET=e2e-ci-secret-placeholder\nBCRYPT_ROUNDS=4\nMONGODB_URI=mongodb://localhost:27017/safety-board-e2e\n' > apps/server/.env

      - name: E2E smoke test
        run: pnpm test:e2e

  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    env:
      GCP_REGION: southamerica-east1
      ARTIFACT_REGISTRY: southamerica-east1-docker.pkg.dev
      GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      SERVER_IMAGE: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/safety-board/server
      CLIENT_IMAGE: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/safety-board/client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build server image
        run: |
          docker build \
            --file apps/server/Dockerfile \
            --tag ${{ env.SERVER_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.SERVER_IMAGE }}:latest \
            .

      - name: Push server image
        run: docker push ${{ env.SERVER_IMAGE }} --all-tags

      - name: Build client image
        run: |
          docker build \
            --file apps/client/Dockerfile \
            --build-arg VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }} \
            --tag ${{ env.CLIENT_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.CLIENT_IMAGE }}:latest \
            .

      - name: Push client image
        run: docker push ${{ env.CLIENT_IMAGE }} --all-tags

      - name: Deploy server to Cloud Run
        run: |
          gcloud run deploy safety-board-server \
            --image ${{ env.SERVER_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3001 \
            --min-instances 1 \
            --max-instances 5 \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars NODE_ENV=production \
            --set-env-vars CLIENT_URL=${{ secrets.CLIENT_URL }} \
            --update-secrets JWT_SECRET=safety-board-jwt-secret:latest \
            --update-secrets MONGODB_URI=safety-board-mongodb-uri:latest \
            --quiet

      - name: Deploy client to Cloud Run
        run: |
          gcloud run deploy safety-board-client \
            --image ${{ env.CLIENT_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 256Mi \
            --cpu 1 \
            --quiet
